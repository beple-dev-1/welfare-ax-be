# 프로파일 지정:
#   로컬 개발: -Dspring.profiles.active=local
#   개발 서버: -Dspring.profiles.active=dev
#   운영:      -Dspring.profiles.active=prod

spring:
  application:
    name: welfare-ax-user
  profiles:
    group:
      # local 프로파일 활성화 시 api 프로파일을 함께 활성화한다
      local:
        - api
      # dev 프로파일 활성화 시 api 프로파일을 함께 활성화한다
      dev:
        - api

server:
  port: 8080

# Swagger UI 기본 비활성화 — local/dev 프로파일에서만 활성화한다
# 운영 환경에서 Swagger가 노출되지 않도록 기본값을 false로 설정한다
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
