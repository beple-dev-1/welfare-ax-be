spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/welfare
    username: welfare
    password: welfare1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: local-dev-secret-key-for-welfare-ax-be-must-be-at-least-32-characters
  expiration: 43200  # 12시간 (초 단위)

logging:
  level:
    com.beplepay.welfareaxbe: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
