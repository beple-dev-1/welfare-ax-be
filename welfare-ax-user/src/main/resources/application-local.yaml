spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/welfare
    username: welfare
    password: welfare1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: local-dev-secret-key-for-welfare-ax-be-must-be-at-least-32-characters
  expiration: 43200  # 12시간 (초 단위)

# 로컬 환경 Swagger UI 활성화
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    try-it-out-enabled: true
  api-docs:
    enabled: true
    path: /v3/api-docs
